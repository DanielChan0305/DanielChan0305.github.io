<div class="course-item">
  <div class="course-header">
    <span class="course-code">{{ include.code }}</span>
    <span class="course-name">{{ include.name }}</span>
  </div>
  <div class="course-details">
    <span class="course-semester">{{ include.semester }}</span>
    <span class="course-grade">{{ include.grade }}</span>
  </div>
</div>
